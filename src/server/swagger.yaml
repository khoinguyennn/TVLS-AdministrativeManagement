tags:
  - name: auth
    description: Authentication API
  - name: users
    description: Users API
  - name: devices
    description: Devices API
  - name: device-reports
    description: Device Reports API (Phiếu báo hỏng)

paths:
  # ==================== AUTH ====================

  # [POST] auth/signup
  /auth/signup:
    post:
      tags:
        - auth
      summary: Đăng ký tài khoản mới
      parameters:
        - name: body
          in: body
          description: Thông tin đăng ký
          required: true
          schema:
            $ref: '#/definitions/signup'
      responses:
        201:
          description: 'Đăng ký thành công'
          schema:
            $ref: '#/definitions/authSuccessResponse'
        400:
          description: 'Dữ liệu không hợp lệ'
        409:
          description: 'Email đã tồn tại'
        500:
          description: 'Lỗi server'

  # [POST] auth/login
  /auth/login:
    post:
      tags:
        - auth
      summary: Đăng nhập tài khoản
      parameters:
        - name: body
          in: body
          description: Thông tin đăng nhập
          required: true
          schema:
            $ref: '#/definitions/login'
      responses:
        200:
          description: 'Đăng nhập thành công'
          schema:
            $ref: '#/definitions/loginResponse'
        401:
          description: 'Sai email hoặc mật khẩu'
        403:
          description: 'Tài khoản bị khóa hoặc vô hiệu hóa'
        500:
          description: 'Lỗi server'

  # [POST] auth/google
  /auth/google:
    post:
      tags:
        - auth
      summary: Đăng nhập bằng Google (chỉ dành cho tài khoản đã có trong hệ thống)
      parameters:
        - name: body
          in: body
          description: Google ID Token (credential từ Google Sign-In)
          required: true
          schema:
            $ref: '#/definitions/googleLogin'
      responses:
        200:
          description: 'Đăng nhập thành công'
          schema:
            $ref: '#/definitions/loginResponse'
        404:
          description: 'Tài khoản không tồn tại trong hệ thống'
        403:
          description: 'Tài khoản bị khóa hoặc vô hiệu hóa'
        401:
          description: 'Token Google không hợp lệ'
        500:
          description: 'Lỗi server'

  # [POST] auth/forgot-password
  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Yêu cầu đặt lại mật khẩu (gửi OTP qua email)
      parameters:
        - name: body
          in: body
          description: Email đăng ký trong hệ thống
          required: true
          schema:
            $ref: '#/definitions/forgotPassword'
      responses:
        200:
          description: 'Mã xác thực đã được gửi'
        403:
          description: 'Tài khoản bị khóa'
        500:
          description: 'Lỗi server'

  # [POST] auth/verify-otp
  /auth/verify-otp:
    post:
      tags:
        - auth
      summary: Xác thực mã OTP
      parameters:
        - name: body
          in: body
          description: Email và mã OTP
          required: true
          schema:
            $ref: '#/definitions/verifyOTP'
      responses:
        200:
          description: 'Mã xác thực hợp lệ'
        400:
          description: 'Mã xác thực không hợp lệ hoặc đã hết hạn'
        500:
          description: 'Lỗi server'

  # [POST] auth/reset-password
  /auth/reset-password:
    post:
      tags:
        - auth
      summary: Đặt lại mật khẩu mới
      parameters:
        - name: body
          in: body
          description: Email, OTP và mật khẩu mới
          required: true
          schema:
            $ref: '#/definitions/resetPassword'
      responses:
        200:
          description: 'Đặt lại mật khẩu thành công'
        400:
          description: 'Mã xác thực không hợp lệ hoặc đã hết hạn'
        404:
          description: 'Không tìm thấy người dùng'
        500:
          description: 'Lỗi server'

  # [POST] auth/refresh
  /auth/refresh:
    post:
      tags:
        - auth
      summary: Làm mới access token
      parameters:
        - name: body
          in: body
          description: Refresh token
          required: true
          schema:
            $ref: '#/definitions/refreshToken'
      responses:
        200:
          description: 'Làm mới token thành công'
        401:
          description: 'Refresh token không hợp lệ'
        500:
          description: 'Lỗi server'

  # [POST] auth/logout
  /auth/logout:
    post:
      tags:
        - auth
      summary: Đăng xuất
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'Đăng xuất thành công'
        401:
          description: 'Chưa xác thực'
        500:
          description: 'Lỗi server'

  # ==================== USERS ====================

  # [GET] users/me
  /users/me:
    get:
      tags:
        - users
      summary: Lấy thông tin cá nhân của người dùng hiện tại
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'Thành công'
          schema:
            $ref: '#/definitions/profileResponse'
        401:
          description: 'Chưa xác thực'
        500:
          description: 'Lỗi server'

    put:
      tags:
        - users
      summary: Cập nhật thông tin cá nhân
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          description: Thông tin cần cập nhật
          required: true
          schema:
            $ref: '#/definitions/updateProfile'
      responses:
        200:
          description: 'Cập nhật thành công'
          schema:
            $ref: '#/definitions/profileResponse'
        400:
          description: 'Dữ liệu không hợp lệ hoặc mật khẩu hiện tại sai'
        401:
          description: 'Chưa xác thực'
        409:
          description: 'Email đã được sử dụng'
        500:
          description: 'Lỗi server'

  # [GET] users
  /users:
    get:
      tags:
        - users
      summary: Lấy danh sách tất cả người dùng
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'OK'
        500:
          description: 'Lỗi server'

    # [POST] users
    post:
      tags:
        - users
      summary: Thêm người dùng mới
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          description: Thông tin người dùng
          required: true
          schema:
            $ref: '#/definitions/signup'
      responses:
        201:
          description: 'Tạo thành công'
        400:
          description: 'Dữ liệu không hợp lệ'
        409:
          description: 'Email đã tồn tại'
        500:
          description: 'Lỗi server'

  # [GET] users/id
  /users/{id}:
    get:
      tags:
        - users
      summary: Lấy thông tin người dùng theo ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          type: integer
      responses:
        200:
          description: 'OK'
        409:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

    # [PUT] users/id
    put:
      tags:
        - users
      summary: Cập nhật thông tin người dùng
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          type: integer
        - name: body
          in: body
          description: Thông tin cập nhật
          required: true
          schema:
            $ref: '#/definitions/updateUser'
      responses:
        200:
          description: 'Cập nhật thành công'
        400:
          description: 'Dữ liệu không hợp lệ'
        409:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

    # [DELETE] users/id
    delete:
      tags:
        - users
      summary: Xóa người dùng
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          type: integer
      responses:
        200:
          description: 'Xóa thành công'
        409:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

  # ==================== DEVICES ====================

  # [GET] devices
  /devices:
    get:
      tags:
        - devices
      summary: Lấy danh sách tất cả thiết bị
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'Thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: array
                items:
                  $ref: '#/definitions/device'
              message:
                type: string
        401:
          description: 'Chưa xác thực'
        500:
          description: 'Lỗi server'

  # ==================== DEVICE REPORTS ====================

  # [GET] device-reports/stats
  /device-reports/stats:
    get:
      tags:
        - device-reports
      summary: Lấy thống kê phiếu báo hỏng
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'Thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                $ref: '#/definitions/deviceReportStats'
              message:
                type: string
        401:
          description: 'Chưa xác thực'
        500:
          description: 'Lỗi server'

  # [GET] device-reports
  /device-reports:
    get:
      tags:
        - device-reports
      summary: Lấy danh sách tất cả phiếu báo hỏng
      security:
        - BearerAuth: []
      responses:
        200:
          description: 'Thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: array
                items:
                  $ref: '#/definitions/deviceReport'
              message:
                type: string
        401:
          description: 'Chưa xác thực'
        500:
          description: 'Lỗi server'

    # [POST] device-reports
    post:
      tags:
        - device-reports
      summary: Tạo phiếu báo hỏng mới (multipart/form-data)
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: deviceId
          in: formData
          description: ID thiết bị bị hỏng
          required: true
          type: integer
          example: 1
        - name: description
          in: formData
          description: Mô tả tình trạng hỏng
          required: true
          type: string
          example: 'Máy chiếu không lên hình, đèn báo đỏ'
        - name: image
          in: formData
          description: Ảnh minh họa (JPG, PNG, GIF, WEBP - tối đa 5MB)
          required: false
          type: file
      responses:
        201:
          description: 'Tạo thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                $ref: '#/definitions/deviceReport'
              message:
                type: string
        400:
          description: 'Dữ liệu không hợp lệ'
        401:
          description: 'Chưa xác thực'
        404:
          description: 'Không tìm thấy thiết bị'
        500:
          description: 'Lỗi server'

  # [GET] device-reports/{id}
  /device-reports/{id}:
    get:
      tags:
        - device-reports
      summary: Lấy chi tiết phiếu báo hỏng theo ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID phiếu báo hỏng
          required: true
          type: integer
      responses:
        200:
          description: 'Thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                $ref: '#/definitions/deviceReport'
              message:
                type: string
        401:
          description: 'Chưa xác thực'
        404:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

    # [PUT] device-reports/{id}
    put:
      tags:
        - device-reports
      summary: Cập nhật phiếu báo hỏng (multipart/form-data)
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: id
          in: path
          description: ID phiếu báo hỏng
          required: true
          type: integer
        - name: description
          in: formData
          description: Mô tả tình trạng hỏng
          required: false
          type: string
        - name: image
          in: formData
          description: Ảnh minh họa mới (JPG, PNG, GIF, WEBP - tối đa 5MB)
          required: false
          type: file
        - name: assignedTo
          in: formData
          description: ID kỹ thuật viên được phân công
          required: false
          type: integer
        - name: status
          in: formData
          description: Trạng thái phiếu
          required: false
          type: string
          enum: ['pending', 'received', 'repairing', 'repaired', 'waiting_replacement', 'unfixable', 'recheck_required', 'completed']
        - name: technicianNote
          in: formData
          description: Ghi chú của kỹ thuật viên
          required: false
          type: string
      responses:
        200:
          description: 'Cập nhật thành công'
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                $ref: '#/definitions/deviceReport'
              message:
                type: string
        400:
          description: 'Dữ liệu không hợp lệ'
        401:
          description: 'Chưa xác thực'
        404:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

    # [DELETE] device-reports/{id}
    delete:
      tags:
        - device-reports
      summary: Xóa phiếu báo hỏng
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID phiếu báo hỏng
          required: true
          type: integer
      responses:
        200:
          description: 'Xóa thành công'
        401:
          description: 'Chưa xác thực'
        404:
          description: 'Không tìm thấy'
        500:
          description: 'Lỗi server'

# definitions
definitions:
  login:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        example: 'admin@thsp.edu.vn'
        description: Email đăng nhập
      password:
        type: string
        example: 'admin@123'
        description: Mật khẩu (tối thiểu 6 ký tự)

  googleLogin:
    type: object
    required:
      - credential
    properties:
      credential:
        type: string
        description: Google ID Token (nhận được từ Google Sign-In callback)
        example: 'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...'

  forgotPassword:
    type: object
    required:
      - email
    properties:
      email:
        type: string
        example: 'user@thsp.edu.vn'
        description: Email đã đăng ký trong hệ thống

  verifyOTP:
    type: object
    required:
      - email
      - otp
    properties:
      email:
        type: string
        example: 'user@thsp.edu.vn'
        description: Email đã đăng ký
      otp:
        type: string
        example: '123456'
        description: Mã OTP 6 chữ số nhận được qua email

  resetPassword:
    type: object
    required:
      - email
      - otp
      - newPassword
    properties:
      email:
        type: string
        example: 'user@thsp.edu.vn'
        description: Email đã đăng ký
      otp:
        type: string
        example: '123456'
        description: Mã OTP 6 chữ số
      newPassword:
        type: string
        example: 'newPassword123'
        description: Mật khẩu mới (tối thiểu 6 ký tự)

  signup:
    type: object
    required:
      - email
      - password
      - fullName
    properties:
      email:
        type: string
        example: 'user@thsp.edu.vn'
        description: Email đăng ký
      password:
        type: string
        example: 'password123'
        description: Mật khẩu (tối thiểu 6 ký tự)
      fullName:
        type: string
        example: 'Nguyen Van A'
        description: Họ và tên
      role:
        type: string
        enum: ['admin', 'manager', 'staff']
        default: 'staff'
        description: Vai trò

  updateUser:
    type: object
    properties:
      fullName:
        type: string
        example: 'Nguyen Van B'
        description: Họ và tên
      password:
        type: string
        description: Mật khẩu mới
      status:
        type: string
        enum: ['active', 'inactive', 'locked']
        description: Trạng thái tài khoản

  updateProfile:
    type: object
    properties:
      email:
        type: string
        example: 'newemail@thsp.edu.vn'
        description: Email mới (nếu muốn thay đổi)
      currentPassword:
        type: string
        example: 'oldpassword123'
        description: Mật khẩu hiện tại (bắt buộc khi đổi mật khẩu)
      newPassword:
        type: string
        example: 'newpassword123'
        description: Mật khẩu mới (tối thiểu 6 ký tự)
      fullName:
        type: string
        example: 'Nguyen Van B'
        description: Họ và tên mới
      avatar:
        type: string
        example: 'https://example.com/avatar.jpg'
        description: URL ảnh đại diện

  refreshToken:
    type: object
    required:
      - refreshToken
    properties:
      refreshToken:
        type: string
        description: Refresh token nhận được khi đăng nhập

  loginResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      data:
        type: object
        properties:
          accessToken:
            type: string
          refreshToken:
            type: string
          user:
            type: object
            properties:
              id:
                type: integer
              email:
                type: string
              fullName:
                type: string
              role:
                type: string
      message:
        type: string
        example: 'Đăng nhập thành công'

  profileResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      data:
        type: object
        properties:
          id:
            type: integer
          email:
            type: string
          fullName:
            type: string
          role:
            type: string
          status:
            type: string
          lastLoginAt:
            type: string
            format: date-time
          createdAt:
            type: string
            format: date-time
      message:
        type: string
        example: 'Lấy thông tin thành công'

  authSuccessResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      data:
        type: object
      message:
        type: string

  device:
    type: object
    properties:
      id:
        type: integer
        example: 1
      name:
        type: string
        example: 'Máy chiếu Epson EB-X51'
      roomId:
        type: integer
        example: 101
      status:
        type: string
        enum: ['active', 'under_repair', 'waiting_replacement', 'broken']
        example: 'active'
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  deviceReport:
    type: object
    properties:
      id:
        type: integer
        example: 1
      reporterId:
        type: integer
        example: 5
      deviceId:
        type: integer
        example: 1
      description:
        type: string
        example: 'Máy chiếu không lên hình, đèn báo đỏ'
      imageUrl:
        type: string
        example: '/uploads/reports/report-1709712000000-123456789.jpg'
      assignedTo:
        type: integer
        example: 3
      status:
        type: string
        enum: ['pending', 'received', 'repairing', 'repaired', 'waiting_replacement', 'unfixable', 'recheck_required', 'completed']
        example: 'pending'
      technicianNote:
        type: string
        example: 'Đã thay bóng đèn mới'
      confirmedAt:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      reporter:
        type: object
        properties:
          id:
            type: integer
          fullName:
            type: string
          avatar:
            type: string
      device:
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
          roomId:
            type: integer
          status:
            type: string
      assignee:
        type: object
        properties:
          id:
            type: integer
          fullName:
            type: string
          avatar:
            type: string

  deviceReportStats:
    type: object
    properties:
      total:
        type: integer
        example: 25
      pending:
        type: integer
        example: 8
      repairing:
        type: integer
        example: 5
      completed:
        type: integer
        example: 12

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: 'Nhập token theo format: Bearer {access_token}'

schemes:
  - https
  - http
