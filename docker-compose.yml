services:
  # ---- MySQL Database ----
  mysql:
    image: mysql:8.0
    container_name: tvls-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tvls-network

  # ---- Backend API Server ----
  server:
    container_name: tvls-server
    build:
      context: ./src/server
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tvls-network

  # ---- Frontend Client ----
  client:
    container_name: tvls-client
    build:
      context: ./src/client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_GITHUB_URL=${NEXT_PUBLIC_GITHUB_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - tvls-network

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: tvls-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - tvls-network

networks:
  tvls-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  server_uploads:
    driver: local
