user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Upload file size limit
    client_max_body_size 50M;

    upstream api-server {
        server server:5000;
        keepalive 100;
    }

    upstream client-app {
        server client:3000;
        keepalive 100;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name thsp.khoinguyen.cloud;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name thsp.khoinguyen.cloud;

        ssl_certificate     /etc/letsencrypt/live/thsp.khoinguyen.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/thsp.khoinguyen.cloud/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # API routes → Backend server (server không dùng prefix /api)
        location ~ ^/(auth|users|staff|notifications|leave-requests|equipment|devices|device-reports|digital-signatures|work-orders|rooms|buildings|chatbot|api-docs)(/|$) {
            proxy_http_version 1.1;
            proxy_pass         http://api-server;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Uploads (static files from server)
        location /uploads/ {
            proxy_http_version 1.1;
            proxy_pass         http://api-server;
            proxy_set_header   Host $host;
        }

        # Everything else → Next.js client
        location / {
            proxy_http_version 1.1;
            proxy_pass         http://client-app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
